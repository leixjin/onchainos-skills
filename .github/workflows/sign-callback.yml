# ──────────────────────────────────────────────────────────────
# Callback from sign-server after macOS binary signing
#
# Trigger: repository_dispatch with event_type "sign-complete"
# Payload:
#   artifact_name   — e.g. "onchainos-aarch64-apple-darwin"
#   binary_name     — e.g. "onchainos-aarch64-apple-darwin"
#   sign_run_id     — sign-server workflow run ID (to download artifact)
#   sign_repo       — e.g. "leixjin/sign-server"
#   callback_ref    — tag to update, e.g. "v1.0.0"
#   macos_targets   — comma-separated list, e.g. "onchainos-aarch64-apple-darwin,onchainos-x86_64-apple-darwin"
# ──────────────────────────────────────────────────────────────
name: Sign Callback

on:
  repository_dispatch:
    types: [sign-complete]

permissions:
  contents: write

jobs:
  update-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          repositories: "sign-server"
          owner: "leixjin"

      - name: Download signed artifact from sign-server
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          SIGN_RUN_ID: ${{ github.event.client_payload.sign_run_id }}
          SIGN_REPO: ${{ github.event.client_payload.sign_repo }}
          ARTIFACT_NAME: ${{ github.event.client_payload.artifact_name }}
        run: |
          gh run download "$SIGN_RUN_ID" \
            --repo "$SIGN_REPO" \
            --name "${ARTIFACT_NAME}-signed" \
            --dir ./signed
          echo "Downloaded signed artifact:"
          ls -lh ./signed/

      - name: Upload signed binary to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.client_payload.callback_ref }}
          BINARY_NAME: ${{ github.event.client_payload.binary_name }}
        run: |
          gh release upload "$TAG" "./signed/$BINARY_NAME" --clobber
          echo "Uploaded $BINARY_NAME to release $TAG"

      - name: Check if all macOS targets are signed and regenerate checksums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.client_payload.callback_ref }}
          MACOS_TARGETS: ${{ github.event.client_payload.macos_targets }}
        run: |
          # Get current release asset names
          ASSETS=$(gh release view "$TAG" --json assets -q '.assets[].name')
          echo "Current release assets:"
          echo "$ASSETS"

          # Check if all expected macOS targets are present
          ALL_PRESENT=true
          IFS=',' read -ra TARGETS <<< "$MACOS_TARGETS"
          for target in "${TARGETS[@]}"; do
            if ! echo "$ASSETS" | grep -qx "$target"; then
              echo "Missing: $target"
              ALL_PRESENT=false
            else
              echo "Present: $target"
            fi
          done

          if [ "$ALL_PRESENT" != "true" ]; then
            echo "Not all macOS targets signed yet. Skipping checksums regeneration."
            exit 0
          fi

          echo "All macOS targets present. Regenerating checksums..."

          # Download all release assets
          mkdir -p ./release-assets
          gh release download "$TAG" --dir ./release-assets

          # Regenerate checksums for all binaries (exclude checksums files and installers)
          cd ./release-assets
          rm -f checksums.txt installer-checksums.txt
          BINARY_FILES=$(ls | grep -v '\.txt$' | grep -v '\.sh$' | grep -v '\.ps1$' || true)
          if [ -n "$BINARY_FILES" ]; then
            sha256sum $BINARY_FILES > checksums.txt
            echo "New checksums:"
            cat checksums.txt
          fi
          cd ..

          # Upload updated checksums
          gh release upload "$TAG" ./release-assets/checksums.txt --clobber
          echo "Checksums regenerated and uploaded."
